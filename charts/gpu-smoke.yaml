apiVersion: v1
kind: Pod
metadata:
  name: gpu-smoke
spec:
  schedulerName: hami-scheduler
  restartPolicy: Never
  containers:
    - name: smoke
      image: nvidia/cuda:12.8.0-base-ubuntu24.04
      command: ["nvidia-smi"]
      resources:
        limits:
          nvidia.com/gpu: "1"
          nvidia.com/gpumem: "2000"
