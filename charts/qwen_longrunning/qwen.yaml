apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen3-8b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen3-8b
  template:
    metadata:
      labels:
        app: qwen3-8b
      annotations:
        hami.io/node-scheduler-policy: binpack
        hami.io/gpu-scheduler-policy: binpack
    spec:
      containers:
        - name: qwen3-8b
          image: vllm/vllm-openai:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: LIBCUDA_LOG_LEVEL
              value: "2"
            - name: GPU_CORE_UTILIZATION_POLICY
              value: force
          command:
            - vllm
            - serve
            - Qwen/Qwen3-8B
            - --dtype=auto
            - --max-model-len=1024
            - --enforce-eager
          resources:
            limits:
              nvidia.com/gpu: "1"
              nvidia.com/gpucores: "30"
              nvidia.com/gpumem: "25600"
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-2
---
apiVersion: v1
kind: Service
metadata:
  name: qwen3-8b
spec:
  selector:
    app: qwen3-8b
  ports:
    - protocol: TCP
      port: 8020
      targetPort: 8000
      name: vllm-svc
  type: ClusterIP
