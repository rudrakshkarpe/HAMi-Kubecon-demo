apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen
  labels:
    app: qwen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen
  template:
    metadata:
      labels:
        app: qwen
      annotations:
        hami.io/node-scheduler-policy: binpack
        hami.io/gpu-scheduler-policy: binpack
    spec:
      schedulerName: hami-scheduler
      containers:
        - name: vllm-qwen
          image: vllm/vllm-openai:latest
          command:
            [
              "vllm",
              "serve",
              "Qwen/Qwen3-1.7B",
              "--max-model-len=8192",
              "--gpu-memory-utilization=0.9",
              "--host",
              "0.0.0.0",
            ]
          resources:
            limits:
              nvidia.com/gpu: "1"
              nvidia.com/gpucores: "30"
              nvidia.com/gpumem: "25000"
---
apiVersion: v1
kind: Service
metadata:
  name: qwen
spec:
  selector:
    app: qwen
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      name: vllm-svc
  type: ClusterIP
